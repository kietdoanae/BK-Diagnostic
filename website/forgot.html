<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — BK Diagnostic</title>
  <link rel="icon" type="image/png" href="https://i.ibb.co/Z0Xc41Z/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
    }
  </script>
  <style>
    .input-field { transition: border-color 0.15s ease, box-shadow 0.15s ease; }
    .input-field:focus { border-color: #1565C0; box-shadow: 0 0 0 3px rgba(21,101,192,0.15); outline: none; }
    .btn-primary { background: linear-gradient(135deg, #1565C0, #1E88E5); transition: opacity 0.15s ease; }
    .btn-primary:hover { opacity: 0.92; }
  </style>
</head>
<body class="font-sans bg-gray-50 min-h-screen flex items-center justify-center antialiased px-4">

<div class="w-full max-w-md">
  <!-- Logo -->
  <a href="index.html" class="flex items-center justify-center gap-2 mb-8">
    <img src="https://i.ibb.co/Z0Xc41Z/logo.png" class="w-9 h-9 rounded-xl object-contain" alt="BK Diagnostic" />
    <span class="font-bold text-blue-800 text-lg">BK Diagnostic</span>
  </a>

  <!-- Card -->
  <div class="bg-white rounded-3xl shadow-xl p-8">

    <!-- Icon -->
    <div class="w-14 h-14 bg-blue-50 rounded-2xl flex items-center justify-center mx-auto mb-5">
      <svg class="w-7 h-7 text-blue-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <rect x="2" y="4" width="20" height="16" rx="2"/>
        <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
      </svg>
    </div>

    <h1 class="text-xl font-extrabold text-gray-900 text-center mb-1">Forgot Password?</h1>
    <p class="text-gray-500 text-sm text-center mb-6 leading-relaxed">
      Enter your registered email address. We'll send you a password reset link.
    </p>

    <div id="msg-box" class="hidden rounded-lg px-4 py-3 text-sm mb-5 font-medium"></div>

    <form id="forgot-form" novalidate>
      <label class="block text-sm font-medium text-gray-700 mb-1.5" for="email">Email</label>
      <input id="email" type="email" autocomplete="email"
        placeholder="example@hcmut.edu.vn"
        class="input-field w-full border border-gray-200 rounded-xl px-4 py-3 text-sm text-gray-800 bg-gray-50 placeholder-gray-400 mb-4"
        required />

      <button id="submit-btn" type="submit"
        class="btn-primary w-full text-white font-semibold py-3 rounded-xl text-sm disabled:opacity-60 disabled:cursor-not-allowed">
        Send Reset Link
      </button>
    </form>

    <div class="mt-5 text-center">
      <a href="login.html" class="text-sm text-blue-600 font-semibold hover:underline">
        ← Back to Sign In
      </a>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://ylspcqbwupnqskqemmiv.supabase.co'
  const SUPABASE_KEY = 'sb_publishable_CiNkaDLXwDkO16g5QYjSmQ_Qh_ZEOWt'

  const { createClient } = supabase
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY)

  function showMsg(text, type) {
    const box = document.getElementById('msg-box')
    box.textContent = text
    box.className = `rounded-lg px-4 py-3 text-sm mb-5 font-medium ${
      type === 'error'
        ? 'bg-red-50 text-red-700 border border-red-200'
        : 'bg-green-50 text-green-700 border border-green-200'
    }`
    box.classList.remove('hidden')
  }

  document.getElementById('forgot-form').addEventListener('submit', async (e) => {
    e.preventDefault()

    const email = document.getElementById('email').value.trim()
    const btn   = document.getElementById('submit-btn')

    if (!email) { showMsg('Please enter your email address.', 'error'); return }

    btn.disabled = true
    btn.textContent = 'Sending…'

    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/reset.html'
    })

    if (error) {
      btn.disabled = false
      btn.textContent = 'Send Reset Link'
      const msg = error.message.includes('rate limit')
        ? 'Too many requests. Please try again in a few minutes.'
        : error.message
      showMsg(msg, 'error')
    } else {
      showMsg('Email sent! Check your inbox for the reset link.', 'success')
      btn.textContent = 'Email sent'
    }
  })
</script>

</body>
</html>
